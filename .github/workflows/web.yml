name: Web Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"

jobs:
  build-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install Dependencies
        working-directory: ./web
        run: npm ci

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Build
        working-directory: ./web
        env:
          # Dummies
          PINATA_JWT: ${{ secrets.PINATA_JWT || 'dummy_jwt' }}
          PINATA_GATEWAY: ${{ secrets.PINATA_GATEWAY || 'dummy.gateway' }}
          NEXT_PUBLIC_SOLANA_RPC_URL: "https://api.devnet.solana.com"
          NEXT_PUBLIC_PROGRAM_ID: "11111111111111111111111111111111"
        run: npm run build
